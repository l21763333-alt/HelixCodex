# ============================================================
# Codex Flow 统一配置 (YAML)
# ============================================================
# 优先级高于 codex_flow_config.json。
# 包含敏感信息的字段 (app_secret, api_key) 建议通过环境变量注入。
#
# 配置分层:
#   codex    — Codex SDK 运行时
#   auth     — API 密钥
#   feishu   — 飞书通知 + 人审交互
#   loop     — 多轮实验编排 + 收敛策略
#   paths    — 项目路径
# ============================================================

# ── Codex SDK ─────────────────────────────────────────────
codex:
  home: ""                 # CODEX_HOME, 空字符串 = 使用默认 ~/.codex
  model: "gpt-5.5"         # 默认模型

# ── API 密钥 (至少填一个) ──────────────────────────────────
auth:
  openai_api_key: ""
  codex_api_key: ""

# ── 飞书集成 ───────────────────────────────────────────────
feishu:
  enabled: true            # 是否启用飞书通知
  app_id: ""
  app_secret: ""                                            # 设置环境变量 FEISHU_APP_SECRET
  chat_id: ""  # 目标群聊 ID (oc_xxx)
  verification_token: ""                                   # 设置环境变量 FEISHU_VERIFICATION_TOKEN

  # 消息接收 (轮询模式, 零外部依赖)
  poll_interval: 5         # 轮询间隔 (秒)

# ── 多轮实验编排 ───────────────────────────────────────────
loop:
  max_iter: 10             # 最大实验轮次
  target_wape: null        # 目标 WAPE (null = 不设上限)
  max_sleep_hours: 24.0    # 额度耗尽时最长等待

  # 🔍 人工审核 (human-in-the-loop)
  human_review:
    enabled: true          # 是否启用飞书人审
    timeout: 1800          # 等待回复超时 (秒), 0 = 无限等待
    auto_fallback: true    # 超时后使用自动建议继续
    authorized_senders: [] # 限定可发指令的用户 open_id, 空 = 群内任何人

  # 🛡️ 安全限制
  limits:
    max_consecutive_reverses: 2   # 连续 reverse 上限, 超出则强制停止
    max_rollbacks_per_round: 3    # 单轮 rollback 上限, 超出自动降级为 reverse

  # 📉 收敛策略
  convergence:
    min_wape_improvement: 0.005   # 最小 WAPE 改善阈值
    max_rounds_without_improvement: 2  # 连续无改善轮次则停止

# ── 项目路径 ───────────────────────────────────────────────
paths:
  experiment_dir: "baseline"
  runs_dir: "runs"
  skills_dir: "skills"
