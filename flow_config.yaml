# Codex Flow unified configuration (YAML)
#
# Sensitive values such as API keys and app secrets should usually come from
# environment variables rather than this file.

codex:
  # Keep CODEX_HOME inside the writable project workspace. The directory is
  # ignored by git and can hold copied/login-generated Codex auth state.
  home: ".codex_home"
  model: "gpt-5.5"

auth:
  openai_api_key: ""
  codex_api_key: ""

feishu:
  enabled: true
  app_id: "cli_aab265dad8bf9cb3"
  app_secret: ""
  chat_id: "oc_f68aa0f27b4e5aa077b962a510f8ae4f"
  verification_token: ""
  poll_interval: 5

loop:
  max_iter: 10
  target_wape: null
  max_sleep_hours: 24.0
  human_review:
    enabled: true
    timeout: 0
    auto_fallback: true
    authorized_senders: []
  limits:
    max_consecutive_reverses: 2
    max_rollbacks_per_round: 3
  convergence:
    min_wape_improvement: 0.0005
    max_rounds_without_improvement: 2

paths:
  experiment_dir: "baseline"
  runs_dir: "runs"
  skills_dir: "skills"

mcp:
  lark:
    enabled: true
    backend: "http"
    server_name: "lark_research"
  git:
    enabled: true
    scope: "baseline_model"
    repo_path: "."
    baseline_dir: "baseline"
    allowed_paths:
      - "baseline/src/**"
      - "baseline/requirements.txt"
    trial_code_subdir: "agent2/code"
    branch_prefix: "model-exp/"
    remote: "origin"
    base_branch: "main"
    require_human_approval_for_push: true
    allow_force_push: false
    allow_reset_hard: false
