# Codex Flow unified configuration (YAML)
#
# Sensitive values such as API keys and app secrets should usually come from
# environment variables rather than this file.

codex:
  # Keep CODEX_HOME inside the writable project workspace. The directory is
  # ignored by git and can hold copied/login-generated Codex auth state.
  home: ".codex_home"
  model: "gpt-5.5"

auth:
  openai_api_key: ""
  codex_api_key: ""

feishu:
  enabled: true
  # Credentials and identifiers are read only from environment variables:
  #   FEISHU_APP_ID
  #   FEISHU_APP_SECRET
  #   FEISHU_CHAT_ID
  #   FEISHU_VERIFICATION_TOKEN
  #   FEISHU_ENCRYPT_KEY (optional, only if callback encryption is enabled)
  poll_interval: 5

loop:
  max_iter: 10
  target_wape: null
  max_sleep_hours: 24.0
  human_review:
    enabled: true
    timeout: 0
    auto_fallback: true
    authorized_senders: []
  limits:
    max_consecutive_reverses: 2
    max_rollbacks_per_round: 3
  convergence:
    min_wape_improvement: 0.0005
    max_rounds_without_improvement: 2

recovery:
  enabled: true
  codex_max_attempts: 2
  retry_delay_seconds: 30
  manual_after_attempts: true
  manual_timeout: 0
  recoverable_codex_phases:
    - "evaluate"
    - "plan"
    - "codegen"
    - "report"
    - "feishu_card"
  degradable_phases:
    - "report"
    - "feishu_card"

paths:
  experiment_dir: "baseline"
  runs_dir: "runs"
  skills_dir: "skills"

mcp:
  lark:
    enabled: true
    backend: "http"
    server_name: "lark_research"
  git:
    enabled: true
    scope: "baseline_model"
    active_repo: "supply_chain_package_forecast"
    repositories:
      supply_chain_package_forecast:
        repo_path: "../SupplyChain_worktree"
        baseline_dir: "src/supply_chain/forecast/package_forecast"
        source_dir: "src/supply_chain/forecast/package_forecast"
        requirements: "src/supply_chain/forecast/package_forecast/requirements.txt"
        allowed_paths:
          - "src/supply_chain/forecast/package_forecast/**"
        branch_prefix: "model-exp/"
        remote: "origin"
        base_branch: "develop"
        push_target_branch: "develop"
        push_on_keep: true
        create_pr_on_keep: false
        pr_draft: true
    repo_path: "../SupplyChain_worktree"
    baseline_dir: "src/supply_chain/forecast/package_forecast"
    source_dir: "src/supply_chain/forecast/package_forecast"
    requirements: "src/supply_chain/forecast/package_forecast/requirements.txt"
    allowed_paths:
      - "src/supply_chain/forecast/package_forecast/**"
    trial_code_subdir: "candidate/code"
    branch_prefix: "model-exp/"
    remote: "origin"
    base_branch: "develop"
    sync_on_loop_start: true
    sync_before_each_trial: false
    publish_via_subagent: true
    push_on_keep: true
    create_pr_on_keep: false
    pr_draft: true
    push_target_branch: "develop"
    server_transport: "stdio"
    server_command: "python"
    server_args:
      - "-m"
      - "mcp_servers.git_research_server.server"
    require_human_approval_for_push: true
    allow_force_push: false
    allow_reset_hard: false
