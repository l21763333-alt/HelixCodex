    repo_path: "../SupplyChain_worktree"
    baseline_dir: "src/supply_chain/forecast/package_forecast"
    source_dir: "src/supply_chain/forecast/package_forecast"
    requirements: "src/supply_chain/forecast/package_forecast/requirements.txt"
    allowed_paths:
      - "src/supply_chain/forecast/package_forecast/**"
    trial_code_subdir: "candidate/code"
    branch_prefix: "model-exp/"
    remote: "origin"
    base_branch: "develop"
    sync_on_loop_start: true
    sync_before_each_trial: false
    # Use direct deterministic Git MCP for sync/publish orchestration; the main optimization still uses Codex threads.
    publish_via_subagent: false
    push_on_keep: true
    create_pr_on_keep: false
    pr_draft: true
    push_target_branch: "develop"
    server_transport: "stdio"
    server_command: "python"
    server_args:
      - "-m"
      - "mcp_servers.git_research_server.server"
    require_human_approval_for_push: true
    allow_force_push: false
    allow_reset_hard: false
