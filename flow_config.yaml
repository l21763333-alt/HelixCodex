# Codex Flow unified configuration (YAML)
#
# Sensitive values such as API keys and app secrets should usually come from
# environment variables rather than this file.

codex:
  # Keep CODEX_HOME inside the writable project workspace. The directory is
  # ignored by git and can hold copied/login-generated Codex auth state.
  home: ".codex_home"
  model: "gpt-5.5"

auth:
  openai_api_key: ""
  codex_api_key: ""

codex_gateway:
  # Use the existing HTTP_PROXY/HTTPS_PROXY by default on this server.
  # Switch mode to cloudflared_access_tcp only after filling a real Access hostname.
  enabled: true
  mode: "proxy_env_only"
  cloudflared_path: ".tools/cloudflared"
  hostname: ""
  listener: "127.0.0.1:18080"
  proxy_url: ""
  log_file: ".codex_home/cloudflared-codex.log"
  pid_file: ".codex_home/cloudflared-codex.pid"
  log_level: "info"
  service_token_id: ""
  service_token_secret: ""

feishu:
  enabled: true
  # Credentials and identifiers are read only from environment variables:
  #   FEISHU_APP_ID
  #   FEISHU_APP_SECRET
  #   FEISHU_CHAT_ID
  #   FEISHU_VERIFICATION_TOKEN
  poll_interval: 5

loop:
  max_iter: 10
  target_wape: null
  max_sleep_hours: 24.0
  human_review:
    enabled: true
    timeout: 0
    auto_fallback: true
    authorized_senders: []
  limits:
    max_consecutive_reverses: 2
    max_rollbacks_per_round: 3
  convergence:
    min_wape_improvement: 0.0005
    max_rounds_without_improvement: 2

recovery:
  enabled: true
  codex_max_attempts: 2
  retry_delay_seconds: 30
  manual_after_attempts: true
  manual_timeout: 0
  recoverable_codex_phases:
    - "evaluate"
    - "plan"
    - "codegen"
    - "report"
    - "feishu_card"
  degradable_phases:
    - "report"
    - "feishu_card"

paths:
  experiment_dir: "baseline"
  runs_dir: "runs"
  skills_dir: "skills"

mcp:
  lark:
    enabled: true
    backend: "http"
    server_name: "lark_research"
  git:
    enabled: true
    scope: "baseline_model"
    active_repo: "supply_chain_package_forecast"
    repositories:
      supply_chain_package_forecast:
        repo:
          # Resolved relative to forecastops-agent/ -> /data/xujuanyi/CodexFlow/SupplyChain_worktree
          path: "../SupplyChain_worktree"
          url: "ssh://git@172.18.254.56:221/haidilao-algo/forecasting/supply_chain.git"
          lifecycle: "clone_if_missing"
          remote: "origin"
          base_branch: "develop"
          sync_strategy: "ff_only"
        model:
          root: "src/supply_chain/forecast/package_forecast"
          copy_include:
            - "**"
          copy_exclude:
            - "__pycache__/**"
            - "*.pyc"
            - ".git/**"
            - "data/**"
            - "outputs/**"
            - "logs/**"
          publish_paths:
            - "src/supply_chain/forecast/package_forecast/**"
          requirements_paths:
            - "requirements.txt"
          entrypoint_candidates:
            - "train.py"
            - "main.py"
            - "run.py"
            - "scripts/train.py"
          default_train_command: []
          output_contract:
            prediction_path: "{trial_id}_package_detail.csv"
            split_column: "split"
            split_filter: "test"
            actual_candidates: ["true_pos_cnt", "true_real_qty_sum", "actual", "y_true"]
            prediction_candidates: ["pred_pos_cnt", "pred_real_qty_sum", "prediction", "y_pred"]
            baseline_prediction_globs: ["*_package_detail.csv", "*.csv"]
            secondary_metric_globs: ["*_store_dish_day.csv"]
            primary_level: "package_detail"
            secondary_level: "store_dish_day"
        publish:
          mode: "direct_branch"
          branch_prefix: "model-exp/"
          target_branch: "develop"
          push_on_keep: true
          create_pr: false
          pr_draft: true

    # Defaults kept consistent for legacy callers and fallback resolution.
    repo:
      path: "../SupplyChain_worktree"
      url: "ssh://git@172.18.254.56:221/haidilao-algo/forecasting/supply_chain.git"
      lifecycle: "clone_if_missing"
      remote: "origin"
